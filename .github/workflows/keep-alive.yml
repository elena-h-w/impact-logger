name: Keep Supabase Alive
on:
  schedule:
    - cron: '0 9 * * 1,4'  # Runs Monday and Thursday at 9am UTC
  workflow_dispatch: # Allows you to run it manually from GitHub to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/impact_entries?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response code: $response"
          if [ "$response" -eq 200 ]; then
            echo "Supabase is alive!"
          else
            echo "Ping failed with status $response"
            exit 1
          fi